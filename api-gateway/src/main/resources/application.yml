server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/auth/**


            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/products,/products/,/products/**

            - id: cart-service
              uri: lb://CART-SERVICE
              predicates:
                - Path=/cart/**

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/orders/**

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payments/**
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka